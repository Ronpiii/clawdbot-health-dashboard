    const links = [{"source":"cold-email","target":"anivia","strength":0.9},{"source":"cold-email","target":"sales-automation","strength":0.8},{"source":"anivia","target":"sales-automation","strength":0.9},{"source":"anivia","target":"supabase","strength":0.7},{"source":"anivia","target":"vercel","strength":0.6},{"source":"context-memory","target":"memory-systems","strength":0.9},{"source":"context-memory","target":"agentic-ai","strength":0.7},{"source":"context-memory","target":"supabase","strength":0.6},{"source":"collabo","target":"agentic-ai","strength":0.8},{"source":"collabo","target":"ux-patterns","strength":0.7},{"source":"collabo","target":"supabase","strength":0.6},{"source":"ventok-saas","target":"anivia","strength":0.8},{"source":"ventok-saas","target":"go-to-market","strength":0.9},{"source":"ventok-saas","target":"pricing","strength":0.7},{"source":"web-design","target":"excalidraw-style","strength":0.7},{"source":"web-design","target":"ux-patterns","strength":0.8},{"source":"excalidraw-style","target":"ux-patterns","strength":0.5},{"source":"agentic-ai","target":"llm-patterns","strength":0.8},{"source":"agentic-ai","target":"memory-systems","strength":0.7},{"source":"memory-systems","target":"llm-patterns","strength":0.6},{"source":"supabase","target":"vercel","strength":0.6},{"source":"supabase","target":"dev-workflow","strength":0.5},{"source":"vercel","target":"dev-workflow","strength":0.6},{"source":"pricing","target":"go-to-market","strength":0.8},{"source":"sales-automation","target":"go-to-market","strength":0.7},{"source":"cold-email","target":"go-to-market","strength":0.6},{"source":"llm-patterns","target":"dev-workflow","strength":0.4}];
    const ACCENT = '#3b82f6';

    const canvas = document.getElementById('graph');
    const ctx = canvas.getContext('2d');
    const sidebar = document.getElementById('sidebar');

    let width, height;
    let offsetX = 0, offsetY = 0;
    let scale = 1;
    let dragging = null;
    let panning = false;
    let panStart = { x: 0, y: 0 };
    let selectedNode = null;
    let hoveredNode = null;

    // physics
    const REPULSION = 8000;
    const ATTRACTION = 0.008;
    const DAMPING = 0.85;
    const CENTER_PULL = 0.001;

    // initialize node positions
    nodes.forEach((node, i) => {
      const angle = (i / nodes.length) * Math.PI * 2;
      const radius = 250 + Math.random() * 100;
      node.x = Math.cos(angle) * radius;
      node.y = Math.sin(angle) * radius;
      node.vx = 0;
      node.vy = 0;
    });

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * devicePixelRatio;
      canvas.height = height * devicePixelRatio;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.scale(devicePixelRatio, devicePixelRatio);
    }

    function getNodeById(id) {
      return nodes.find(n => n.id === id);
    }

    function simulate() {
      // repulsion between nodes
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[j].x - nodes[i].x;
          const dy = nodes[j].y - nodes[i].y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const force = REPULSION / (dist * dist);
          const fx = (dx / dist) * force;
          const fy = (dy / dist) * force;
          nodes[i].vx -= fx;
          nodes[i].vy -= fy;
          nodes[j].vx += fx;
          nodes[j].vy += fy;
        }
      }

      // attraction along links
      links.forEach(link => {
        const source = getNodeById(link.source);
        const target = getNodeById(link.target);
        if (!source || !target) return;
        const dx = target.x - source.x;
        const dy = target.y - source.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const force = dist * ATTRACTION * link.strength;
        const fx = (dx / dist) * force;
        const fy = (dy / dist) * force;
        source.vx += fx;
        source.vy += fy;
        target.vx -= fx;
        target.vy -= fy;
      });

      // center pull
      nodes.forEach(node => {
        node.vx -= node.x * CENTER_PULL;
        node.vy -= node.y * CENTER_PULL;
      });

      // apply velocity
      nodes.forEach(node => {
        if (node === dragging) return;
        node.vx *= DAMPING;
        node.vy *= DAMPING;
        node.x += node.vx;
        node.y += node.vy;
      });
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      ctx.save();
      ctx.translate(width / 2 + offsetX, height / 2 + offsetY);
      ctx.scale(scale, scale);

      // draw links
      links.forEach(link => {
        const source = getNodeById(link.source);
        const target = getNodeById(link.target);
        if (!source || !target) return;
        
        const isHighlighted = selectedNode && 
          (link.source === selectedNode.id || link.target === selectedNode.id);
        
        ctx.beginPath();
        ctx.moveTo(source.x, source.y);
        ctx.lineTo(target.x, target.y);
        ctx.strokeStyle = isHighlighted 
          ? 'rgba(59, 130, 246, 0.4)'
          : 'rgba(255,255,255,' + (link.strength * 0.08) + ')';
        ctx.lineWidth = isHighlighted ? 2 : link.strength * 1.5;
        ctx.stroke();
      });

      // draw nodes
      nodes.forEach(node => {
        const isSelected = selectedNode === node;
        const isHovered = hoveredNode === node;
        const isConnected = selectedNode && links.some(l => 
          (l.source === selectedNode.id && l.target === node.id) ||
          (l.target === selectedNode.id && l.source === node.id)
        );

        // determine opacity
        const dimmed = selectedNode && !isSelected && !isConnected;
        
        // node circle
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        
        if (isSelected) {
          ctx.fillStyle = ACCENT;
        } else if (isHovered) {
          ctx.fillStyle = '#333';
        } else if (dimmed) {
          ctx.fillStyle = '#1a1a1a';
        } else {
          ctx.fillStyle = '#222';
        }
        ctx.fill();
        
        // border
        ctx.strokeStyle = isSelected ? ACCENT : (dimmed ? '#222' : '#333');
        ctx.lineWidth = isSelected ? 2 : 1;
        ctx.stroke();

        // label
        ctx.fillStyle = isSelected ? '#fff' : (dimmed ? '#444' : '#999');
        ctx.font = (isSelected ? '600 ' : '400 ') + '12px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(node.label, node.x, node.y);
      });

      ctx.restore();
    }

    function loop() {
      simulate();
      draw();
      requestAnimationFrame(loop);
    }

    function screenToWorld(sx, sy) {
      return {
        x: (sx - width / 2 - offsetX) / scale,
        y: (sy - height / 2 - offsetY) / scale
      };
    }

    function getNodeAt(wx, wy) {
      for (let i = nodes.length - 1; i >= 0; i--) {
        const node = nodes[i];
        const dx = wx - node.x;
        const dy = wy - node.y;
        if (dx * dx + dy * dy < node.radius * node.radius) {
          return node;
        }
      }
      return null;
    }

    function showSidebar(node) {
      selectedNode = node;
      document.getElementById('topic-title').textContent = node.label;
      document.getElementById('topic-cluster').textContent = node.cluster;
      document.getElementById('topic-meta').textContent = 
        node.mentions + ' mentions across ' + node.files.length + ' files';
      
      const threadsList = document.getElementById('threads-list');
      threadsList.innerHTML = node.threads.map(t => 
        '<li>' + t + '</li>'
      ).join('');

      const filesList = document.getElementById('files-list');
      filesList.innerHTML = node.files.slice(0, 10).map(f => 
        '<span class="file-tag">' + f + '</span>'
      ).join('');

      sidebar.classList.add('open');
    }

    function closeSidebar() {
      selectedNode = null;
      sidebar.classList.remove('open');
    }

    canvas.addEventListener('mousedown', e => {
      const world = screenToWorld(e.clientX, e.clientY);
      const node = getNodeAt(world.x, world.y);
      if (node) {
        dragging = node;
      } else {
        panning = true;
        panStart = { x: e.clientX - offsetX, y: e.clientY - offsetY };
      }
    });

    canvas.addEventListener('mousemove', e => {
      const world = screenToWorld(e.clientX, e.clientY);
      
      if (dragging) {
        dragging.x = world.x;
        dragging.y = world.y;
        dragging.vx = 0;
        dragging.vy = 0;
      } else if (panning) {
        offsetX = e.clientX - panStart.x;
        offsetY = e.clientY - panStart.y;
      } else {
        // hover detection
        hoveredNode = getNodeAt(world.x, world.y);
        canvas.style.cursor = hoveredNode ? 'pointer' : 'default';
      }
    });

    canvas.addEventListener('mouseup', e => {
      if (dragging && !panning) {
        const world = screenToWorld(e.clientX, e.clientY);
        const node = getNodeAt(world.x, world.y);
        if (node === dragging) {
          showSidebar(node);
        }
      }
      dragging = null;
      panning = false;
    });

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
      scale = Math.max(0.3, Math.min(3, scale * zoomFactor));
    });

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        scale = 1;
        offsetX = 0;
        offsetY = 0;
        closeSidebar();
      } else if (e.code === 'Escape') {
        closeSidebar();
      }
    });

    document.getElementById('close-sidebar').addEventListener('click', closeSidebar);

    window.addEventListener('resize', resize);
    resize();
    loop();
  </script>
